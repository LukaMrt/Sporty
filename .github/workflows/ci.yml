name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [lint, 'format:check', typecheck, build, depcruise]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm ${{ matrix.check }}

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: sporty
          POSTGRES_PASSWORD: sporty
          POSTGRES_DB: sporty_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      NODE_ENV: test
      APP_KEY: ${{ secrets.APP_KEY }}
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: sporty
      DB_PASSWORD: sporty
      DB_DATABASE: sporty_test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  docker:
    needs: [quality, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/arm64/v8
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sporty:latest
