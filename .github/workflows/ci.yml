name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25.6.1
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: generated-types
          path: .adonisjs/server/

  static-analysis:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [lint, 'format:check', depcruise]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25.6.1
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm ${{ matrix.check }}

  typecheck:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25.6.1
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .adonisjs/server/

      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: sporty
          POSTGRES_PASSWORD: sporty
          POSTGRES_DB: sporty_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      NODE_ENV: test
      APP_KEY: kDvkrhtbc8N2L0ftV-wQbX4Msfce8-IrF4AsJwtJ4do
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: sporty
      DB_PASSWORD: sporty
      DB_DATABASE: sporty_test
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      SESSION_DRIVER: memory
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25.6.1
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: node ace migration:run --force

      - run: pnpm test

  e2e:
    needs: [test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: sporty
          POSTGRES_PASSWORD: sporty
          POSTGRES_DB: sporty_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      NODE_ENV: test
      APP_KEY: kDvkrhtbc8N2L0ftV-wQbX4Msfce8-IrF4AsJwtJ4do
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: sporty
      DB_PASSWORD: sporty
      DB_DATABASE: sporty_e2e
      PORT: 3334
      HOST: 0.0.0.0
      LOG_LEVEL: error
      SESSION_DRIVER: cookie
      TZ: UTC
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25.6.1
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run migrations
        run: node ace migration:run --force

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    needs: [build, static-analysis, typecheck, test, e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/arm64/v8
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sporty:latest
